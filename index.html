<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politie Academie - Tekstverbanden Master</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --p-blue: #1c2e4a; --p-gold: #c5a059; --p-light: #f4f7f9; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--p-blue); margin: 0; padding: 10px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 10px; max-width: 800px; margin: 20px auto; border-top: 8px solid var(--p-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        h1 { color: var(--p-blue); text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        
        .zin-box { background: var(--p-blue); color: white; padding: 20px; border-radius: 8px; text-align: center; margin: 20px 0; font-size: 1.2rem; min-height: 60px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--p-gold); }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; cursor: pointer; border: 2px solid var(--p-blue); background: white; color: var(--p-blue); font-weight: bold; border-radius: 6px; transition: 0.2s; }
        button:hover { background: var(--p-blue); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.primary { background: var(--p-blue); color: white; width: 100%; margin-top: 10px; border: none; text-transform: uppercase; padding: 18px; }
        
        .control-panel { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .status-badge { background: #eee; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: var(--p-blue); color: white; }
        .rank-1 { background: #fff9e6; font-weight: bold; }
    </style>
</head>
<body>

<audio id="sound-correct" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bbd1345431.mp3"></audio>
<audio id="sound-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c3507e158a.mp3"></audio>

<div class="container">
    <div id="role-screen" class="card">
        <h1>Politie Academie: Training</h1>
        <button class="primary" onclick="initRole('student')">Entry: Ik ben een Student</button>
        <button class="primary" onclick="initRole('docent')" style="background:#555;">Command: Ik ben de Docent</button>
        <button class="primary" onclick="initRole('scoreboard')" style="background:var(--p-gold); color:black;">Meldkamer: Live Leaderboard</button>
    </div>

    <div id="student-screen" class="card hidden">
        <h1 id="student-title">Aanmelden</h1>
        <div id="student-login-fields">
            <input type="text" id="student-name" placeholder="Je roepnaam" style="width:100%; padding:12px; margin-bottom:10px;">
            <select id="klas-select" style="width:100%; padding:12px; margin-bottom:10px;">
                <option value="alpha">Eenheid Alpha (A)</option>
                <option value="bravo">Eenheid Bravo (B)</option>
            </select>
            <button class="primary" onclick="loginStudent()">MELDEN BIJ CENTRALE</button>
        </div>
        
        <div id="game-area" class="hidden">
            <div id="status-row" style="text-align:right; margin-bottom:10px;"></div>
            <div class="zin-box" id="zin-display">Wachten op de volgende opdracht van de commandant...</div>
            <div class="options" id="options-container"></div>
            <div id="feedback" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="docent-screen" class="card hidden">
        <h1>Command Dashboard</h1>
        <select id="docent-klas" onchange="initDocent()" style="width:100%; padding:12px;">
            <option value="alpha">Eenheid Alpha</option>
            <option value="bravo">Eenheid Bravo</option>
        </select>
        
        <div class="control-panel">
            <button onclick="changeQuestion(-1)">⬅ Vorige Zin</button>
            <div id="question-counter" style="align-self: center; font-weight: bold;">Zin: 1 / 40</div>
            <button onclick="changeQuestion(1)">Volgende Zin ➡</button>
        </div>

        <div id="live-monitor">
            <h3>Actieve Agenten</h3>
            <div id="presence-list">Wachten op aanmeldingen...</div>
        </div>
        <button class="primary" onclick="resetGame()" style="background:var(--danger); margin-top:40px;">Sessie Resetten</button>
    </div>

    <div id="scoreboard-screen" class="card hidden">
        <h1>Live Leaderboard</h1>
        <div id="score-table-container"></div>
    </div>
</div>

<script>
// --- CONFIG (Same Firebase) ---
const firebaseConfig = {
    apiKey: "AIzaSyB12mTMBnuxdC4W4htyFO_C7Dnh3maVKew",
    authDomain: "decoroefening.firebaseapp.com",
    databaseURL: "https://decoroefening-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "decoroefening",
    storageBucket: "decoroefening.firebasestorage.app",
    messagingSenderId: "945998495824",
    appId: "1:945998495824:web:a76dc7519b3b262a021155"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- LEERSTOF (Gekopieerd uit origineel) ---
const leerstof = [
    { type: "verband", zin: "Eerst zekerden we de plaats delict, daarna startte de recherche het onderzoek.", correct: "Volgorde van tijd", fout: ["Conclusie", "Voorbeeld", "Doel-middel"] },
    { type: "verband", zin: "De verdachte droeg een bivakmuts; daarom konden we hem niet herkennen.", correct: "Oorzaak en gevolg", fout: ["Opsomming", "Voorbeeld", "Doel-middel"] },
    { type: "verband", zin: "De agent trok zijn taser om de vluchtende verdachte te stoppen.", correct: "Doel-middel", fout: ["Conclusie", "Oorzaak en gevolg", "Voorbeeld"] },
    { type: "verband", zin: "De surveillanten controleerden op snelheid, gordels en ook op alcoholgebruik.", correct: "Opsomming", fout: ["Doel-middel", "Oorzaak en gevolg", "Conclusie"] },
    { type: "verband", zin: "Kortom, de inval was een groot succes door de goede voorbereiding.", correct: "Conclusie", fout: ["Volgorde van tijd", "Voorbeeld", "Opsomming"] },
    // ... (rest van de 40 zinnen uit jouw bron)
];

let globalName, globalKlas, currentQIndex = 0;
let hasAnsweredCurrent = false;

function initRole(role) {
    document.getElementById('role-screen').classList.add('hidden');
    document.getElementById(role + '-screen').classList.remove('hidden');
    if(role === 'docent') initDocent();
    if(role === 'scoreboard') updateScoreboardView('alpha');
}

// --- STUDENT LOGIC ---
function loginStudent() {
    globalName = document.getElementById('student-name').value.trim();
    globalKlas = document.getElementById('klas-select').value;
    if(!globalName) return alert("Voer je roepnaam in!");
    
    db.ref(`lessen/${globalKlas}/scores/${globalName}`).set(0);
    document.getElementById('student-login-fields').classList.add('hidden');
    document.getElementById('student-title').innerText = "Agent: " + globalName;
    document.getElementById('game-area').classList.remove('hidden');

    // Luister naar welke vraag de docent aanbiedt
    db.ref(`lessen/${globalKlas}/currentQuestion`).on('value', s => {
        currentQIndex = s.val() || 0;
        hasAnsweredCurrent = false;
        renderQuestion();
    });
}

function renderQuestion() {
    const v = leerstof[currentQIndex];
    const cont = document.getElementById('options-container');
    document.getElementById('zin-display').innerText = v.zin;
    document.getElementById('feedback').innerText = "";
    cont.innerHTML = "";

    let opts = [v.correct, ...v.fout].sort(() => Math.random() - 0.5);
    
    opts.forEach(o => {
        let b = document.createElement('button');
        b.innerText = o;
        b.onclick = () => {
            if(hasAnsweredCurrent) return;
            if(o === v.correct) {
                const sCorrect = document.getElementById('sound-correct');
                sCorrect.currentTime = 0; sCorrect.play().catch(()=>{});
                db.ref(`lessen/${globalKlas}/scores/${globalName}`).transaction(sc => (sc||0)+1);
                document.getElementById('feedback').innerText = "CORRECT!";
                document.getElementById('feedback').style.color = "green";
            } else {
                const sWrong = document.getElementById('sound-wrong');
                sWrong.currentTime = 0; sWrong.play().catch(()=>{});
                document.getElementById('feedback').innerText = "ONJUIST! Het juiste antwoord was: " + v.correct;
                document.getElementById('feedback').style.color = "red";
            }
            hasAnsweredCurrent = true;
            Array.from(cont.getElementsByTagName('button')).forEach(btn => btn.disabled = true);
        };
        cont.appendChild(b);
    });
}

// --- DOCENT LOGIC ---
function initDocent() {
    const klas = document.getElementById('docent-klas').value;
    db.ref(`lessen/${klas}/currentQuestion`).on('value', s => {
        currentQIndex = s.val() || 0;
        document.getElementById('question-counter').innerText = `Zin: ${currentQIndex + 1} / ${leerstof.length}`;
    });

    db.ref(`lessen/${klas}/scores`).on('value', s => {
        const scores = s.val();
        document.getElementById('presence-list').innerText = scores ? Object.keys(scores).join(", ") : "Geen agenten actief.";
    });
}

function changeQuestion(delta) {
    const klas = document.getElementById('docent-klas').value;
    let newIdx = currentQIndex + delta;
    if(newIdx >= 0 && newIdx < leerstof.length) {
        db.ref(`lessen/${klas}/currentQuestion`).set(newIdx);
    }
}

function resetGame() {
    const klas = document.getElementById('docent-klas').value;
    if(confirm("Alle scores en voortgang wissen?")) {
        db.ref(`lessen/${klas}`).remove().then(() => location.reload());
    }
}

// --- SCOREBOARD ---
function updateScoreboardView(klas) {
    const container = document.getElementById('score-table-container');
    db.ref(`lessen/${klas}/scores`).on('value', s => {
        const data = s.val();
        if(!data) { container.innerHTML = "<p>Wachten op resultaten...</p>"; return; }
        
        let arr = Object.keys(data).map(name => ({ name: name, score: data[name] }));
        arr.sort((a, b) => b.score - a.score);
        
        let html = "<table><tr><th>Rang</th><th>Agent</th><th>Punten</th></tr>";
        arr.forEach((p, i) => {
            html += `<tr class="${i===0?'rank-1':''}"><td>#${i+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
        });
        container.innerHTML = html + "</table>";
    });
}
</script>
</body>
</html>
